<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="{% if request.path=='/' %}active{% endif %}">Home</a>
    <a href="/products" class="{% if '/products' in request.path %}active{% endif %}">Products</a>
    <a href="/cart" class="{% if '/cart' in request.path %}active{% endif %}">My Cart</a>
    <a href="/login" class="{% if '/login' in request.path %}active{% endif %}">Login</a>
    <a href="/register" class="{% if '/register' in request.path %}active{% endif %}">Register</a>
</nav>

<h2>Our Products</h2>

<div class="products-container">
{% for product in products %}
<div class="product-card">
    <img src="{{ url_for('static', filename='images/' ~ product[6]) }}" alt="{{ product[1] }}">
    <h3>{{ product[1] }}</h3>
    <p>₹{{ product[4] }}</p>
    <a href="{{ url_for('add_to_cart', product_id=product[0]) }}">Add to Cart</a>
    <a href="{{ url_for('subsidy', product_id=product[0]) }}">Subsidy Info</a>
</div>
{% endfor %}
</div>

</body>
</html>
